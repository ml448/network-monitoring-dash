
services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    networks:
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - influxdb
    environment:
      - PORT=8000
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY}
      - SNMP_TIMEOUT=${SNMP_TIMEOUT}
      - SNMP_RETRIES=${SNMP_RETRIES}
      - SNMP_POLL_INTERVAL=${SNMP_POLL_INTERVAL}
      - DEMO_MODE=${DEMO_MODE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      # JWT Authentication
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      # Rate Limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED}
      - RATE_LIMIT_LOGIN=${RATE_LIMIT_LOGIN}
      - RATE_LIMIT_REGISTER=${RATE_LIMIT_REGISTER}
      - RATE_LIMIT_DEVICE=${RATE_LIMIT_DEVICE}
      - RATE_LIMIT_DETAIL=${RATE_LIMIT_DETAIL}
      - RATE_LIMIT_HISTORY=${RATE_LIMIT_HISTORY}
      - RATE_LIMIT_USER=${RATE_LIMIT_USER}
      - RATE_LIMIT_HEALTH=${RATE_LIMIT_HEALTH}
      - RATE_LIMIT_ROOT=${RATE_LIMIT_ROOT}
      # SMTP / Email Alerts
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - ALERT_FROM_EMAIL=${ALERT_FROM_EMAIL}
      - ALERT_TO_EMAIL=${ALERT_TO_EMAIL}
      # Alert Thresholds
      - ALERT_CPU_THRESHOLD=${ALERT_CPU_THRESHOLD}
      - ALERT_MEMORY_THRESHOLD=${ALERT_MEMORY_THRESHOLD}
      - ALERT_BANDWIDTH_THRESHOLD=${ALERT_BANDWIDTH_THRESHOLD}
      - ALERT_RESPONSE_TIME_THRESHOLD=${ALERT_RESPONSE_TIME_THRESHOLD}
      - ALERT_COOLDOWN_TIME=${ALERT_COOLDOWN_TIME}
    volumes:
      - ./backend/app:/app/app
    networks:
      - monitoring-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    networks:
      - monitoring-network
    depends_on:
      - influxdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:

networks:
  monitoring-network:
    driver: bridge